<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Polla Mundialista 2026 | MISAGATECH</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- ===================================================== -->
  <!-- AUTH SCREEN -->
  <!-- ===================================================== -->

  <div id="authScreen" class="auth-screen">

    <div class="auth-card">

      <div class="auth-logo-area">
        <img src="assets/img/logo-fifa.png" alt="Logo Mundial" class="auth-logo">
      </div>

      <h1 class="auth-title">
        COPA MUNDIAL 2026
      </h1>

      <p class="auth-subtitle">
        Predice. Compite. Gana.
      </p>

      <div class="auth-form">

        <input type="email" id="loginEmail" placeholder="Correo electrónico" class="auth-input">

        <input type="password" id="loginPassword" placeholder="Contraseña" class="auth-input">

        <button id="btnLogin" class="auth-btn-login">
          Iniciar sesión
        </button>

        <div class="auth-divider"></div>

        <input type="text" id="registerName" placeholder="Nombre completo" class="auth-input">

        <input type="email" id="registerEmail" placeholder="Correo electrónico" class="auth-input">

        <input type="password" id="registerPassword" placeholder="Contraseña" class="auth-input">

        <button id="btnRegister" class="auth-btn-register">
          Registrarse
        </button>

      </div>

    </div>

  </div>

  <!-- ===================================================== -->
  <!-- APP PRINCIPAL -->
  <!-- ===================================================== -->

  <div id="appScreen" class="hidden">

    <!-- ===================================================== -->
    <!-- HERO HEADER -->
    <!-- ===================================================== -->

    <header class="hero-header">

      <div class="hero-overlay"></div>

      <div class="hero-content">

        <!-- TOPBAR -->

        <div class="topbar">

          <div class="logo-area">
            <img src="assets/img/logo-fifa.png" class="hero-logo">
          </div>

          <div class="user-actions">

            <span id="userEmail" class="user-badge"></span>

            <button id="btnLogout" class="logout-btn">

              <i class="fas fa-sign-out-alt"></i>

              Salir

            </button>

          </div>

        </div>


    </header>

    <!-- ===================================================== -->
    <!-- MAIN -->
    <!-- ===================================================== -->

    <main class="main-layout">

      <!-- ===================================================== -->
      <!-- CONTENT -->
      <!-- ===================================================== -->

      <div class="content-area">

        <!-- ===================================================== -->
        <!-- ADMIN PANEL -->
        <!-- ===================================================== -->

        <section id="adminPanel" class="hidden admin-panel">

          <!-- HEADER -->

          <div class="admin-panel-header">

            <div class="admin-panel-title">

              <i class="fas fa-user-shield"></i>

              <h2>
                Panel de Administración
              </h2>

            </div>

          </div>

          <!-- MATCHES -->

          <div id="adminMatchesList"></div>

          <!-- BTN -->

          <div class="admin-bottom-actions">

            <button id="btnCargarPartidos" class="admin-load-btn">

              <i class="fas fa-download"></i>

              Cargar Mundial 2026

            </button>

          </div>

        </section>

        <!-- ===================================================== -->
        <!-- GROUPS SECTION -->
        <!-- ===================================================== -->

        <section class="groups-section">

          <div class="section-title-row">

            <div>

              <span class="section-mini-title">
                FASE INICIAL
              </span>

              <h2 class="section-title">
                Fase de Grupos
              </h2>

            </div>

          </div>

          <!-- TABS -->

          <div class="groups-tabs-wrapper">

            <button id="scrollGruposLeft" class="scroll-btn">

              <i class="fas fa-chevron-left"></i>

            </button>

            <button id="scrollGruposRight" class="scroll-btn">

              <i class="fas fa-chevron-right"></i>

            </button>

          </div>

        </section>

        <!-- ===================================================== -->
        <!-- MATCHES -->
        <!-- ===================================================== -->

        <div id="gruposContainer" class="groups-matches-container"></div>

      </div>

      <!-- ===================================================== -->
      <!-- SIDEBAR -->
      <!-- ===================================================== -->

      <aside class="sidebar-area">

        <!-- POSICIÓN -->

        <div class="sidebar-card">

          <h3 class="sidebar-small-title">
            Mi posición actual
          </h3>

          <div class="sidebar-big-number" id="miPosicion">
            -
          </div>

          <div class="sidebar-points">
            <span id="misPuntos">0</span> PTS
          </div>

        </div>

        <!-- PRÓXIMO PARTIDO -->

        <div class="sidebar-card">

          <h3 class="sidebar-small-title">
            Próximo Partido
          </h3>

          <div class="next-match">

            <span id="proxLocal">---</span>

            <strong>VS</strong>

            <span id="proxVisit">---</span>

          </div>

          <div class="next-date" id="proxFecha">
            --/--/----
          </div>

          <button id="verGrupoBtn" class="sidebar-btn">
            Ver grupo
          </button>

        </div>

        <!-- PREMIOS -->

        <div class="sidebar-card sidebar-trophy">

          <i class="fas fa-trophy trophy-icon"></i>

          <h3>
            ¡GANA PREMIOS!
          </h3>

          <p>
            Los mejores estrategas subirán al podio dorado 🏆
          </p>

        </div>

      </aside>

    </main>

    <!-- ===================================================== -->
    <!-- FOOTER -->
    <!-- ===================================================== -->

    <footer class="site-footer">

      © 2026 MISAGATECH · Polla Mundialista FIFA 2026

    </footer>

  </div>

  <!-- ===================================================== -->
  <!-- SCRIPTS -->
  <!-- ===================================================== -->

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/app.js"></script>

</body>

</html>
