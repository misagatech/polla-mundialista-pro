<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Polla Mundialista 2026 | MISAGATECH</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Tailwind CSS para rapidez (opcional, pero mejora diseño) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#0A1E3F] to-[#081A33] text-white">

  <!-- Pantalla de login/registro -->
  <div id="authScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-md rounded-2xl p-8 w-full max-w-md">
      <h1 class="text-3xl font-bold text-center text-yellow-400">⚽ POLLA MUNDIALISTA 2026</h1>
      <p class="text-center text-gray-300 mt-2">Predice. Compite. Gana.</p>
      
      <div class="mt-8 space-y-4">
        <input type="email" id="loginEmail" placeholder="Correo electrónico" class="w-full p-3 rounded-lg bg-white/20 text-white placeholder-gray-300">
        <input type="password" id="loginPassword" placeholder="Contraseña" class="w-full p-3 rounded-lg bg-white/20 text-white placeholder-gray-300">
        <button id="btnLogin" class="w-full bg-yellow-500 text-black font-bold p-3 rounded-lg">Iniciar sesión</button>
        <hr class="border-gray-500">
        <input type="text" id="registerName" placeholder="Nombre completo" class="w-full p-3 rounded-lg bg-white/20 text-white placeholder-gray-300">
        <input type="email" id="registerEmail" placeholder="Correo electrónico" class="w-full p-3 rounded-lg bg-white/20 text-white placeholder-gray-300">
        <input type="password" id="registerPassword" placeholder="Contraseña" class="w-full p-3 rounded-lg bg-white/20 text-white placeholder-gray-300">
        <button id="btnRegister" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg">Registrarse</button>
      </div>
    </div>
  </div>

  <!-- Pantalla principal (después de login) -->
  <div id="appScreen" class="hidden min-h-screen pb-20">
    <header class="bg-black/30 backdrop-blur-md p-4 sticky top-0 z-10">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold text-yellow-400">⚽ Mi Polla</h1>
        <div class="flex gap-4 items-center">
          <span id="userEmail" class="text-sm"></span>
          <button id="btnLogout" class="bg-red-600 text-white px-4 py-1 rounded-lg text-sm">Salir</button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
      <!-- Ranking -->
      <div class="bg-white/10 rounded-xl p-4 mb-6">
        <h2 class="text-xl font-bold mb-2">🏆 Ranking en vivo</h2>
        <ul id="rankingList" class="space-y-2"></ul>
      </div>

      <!-- Panel de administración (solo visible para admin) -->
      <div id="adminPanel" class="hidden bg-red-900/30 rounded-xl p-4 mb-6">
        <h2 class="text-xl font-bold text-red-300">🔧 Panel de Administración</h2>
        <div id="adminMatchesList" class="mt-4 space-y-3"></div>
        <button id="btnCargarPartidos" class="mt-4 bg-green-700 text-white px-4 py-2 rounded-lg">🌍 Cargar Mundial 2026 (104 partidos)</button>
      </div>

      <!-- Lista de partidos -->
      <div id="matchesContainer" class="space-y-4"></div>
    </main>
  </div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/app.js"></script>
  <!-- El archivo partidos.js se cargará dentro del botón admin -->
</body>
</html>
